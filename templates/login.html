{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[50vh]">
    <div class="w-full max-w-md bg-white rounded-lg shadow-md p-8">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-8">تسجيل دخول للمسؤول</h2>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4" role="alert">
            {{ messages[0] }}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="/admin/login">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="username">
                    اسم المستخدم
                </label>
                <input
                    class="shadow appearance-none border rounded w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-brand-500"
                    id="username" name="username" type="text" placeholder="اسم المستخدم">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">
                    كلمة المرور
                </label>
                <input
                    class="shadow appearance-none border rounded w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-brand-500"
                    id="password" name="password" type="password" placeholder="******************">
            </div>
            <div class="flex items-center justify-between">
                <button
                    class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 px-4 rounded focus:outline-none focus:shadow-outline transition"
                    type="submit">
                    دخول
                </button>
            </div>
        </form>
        <!-- <p class="text-center text-gray-400 text-sm mt-4">Demo: admin / admin</p> -->
    </div>
</div>
{% endblock %}
